<meta charset="UTF-8">

<title>Blog — The XL Academy</title>
<meta name="description" content="Read the latest from The XL Academy blog.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->


<div id="site-header"></div>

<article class="section">
  <div class="container" style="max-width:820px">
    <nav class="breadcrumb" aria-label="Breadcrumb" style="color:var(--muted)"><a href="/" style="color:var(--muted)">Home</a><span class="sep">›</span><a href="blog" style="color:var(--muted)">Blog</a><span class="sep">›</span><span id="crumb">Post</span></nav>
    <div id="postWrap">
      <p id="postState" style="text-align:center;color:var(--muted);padding:50px 0">Loading…</p>
    </div>
    <div style="margin-top:36px"><a href="blog" class="btn btn-outline">← Back to Blog</a></div>
  </div>
</article>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
// Paste your Blog Apps Script Web App URL here (same as blog.html)
var BLOG_ENDPOINT = 'PASTE_YOUR_BLOG_APPS_SCRIPT_WEB_APP_URL_HERE';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtDate(d){ if(!d) return ''; var t=new Date(d); if(isNaN(t)) return esc(d);
  return t.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}); }
function qs(k){ return new URLSearchParams(location.search).get(k) || ''; }

var wrap = document.getElementById('postWrap');
var state = document.getElementById('postState');
var slug = qs('slug') || qs('id');

if(!BLOG_ENDPOINT || BLOG_ENDPOINT.indexOf('PASTE_')===0){
  state.textContent = 'Blog is not configured yet.';
} else if(!slug){
  state.textContent = 'Post not found.';
} else {
  fetch(BLOG_ENDPOINT + '?action=post&slug=' + encodeURIComponent(slug))
    .then(function(r){return r.json();})
    .then(function(data){
      var p = data && data.post;
      if(!p){ state.textContent = 'Post not found.'; return; }
      document.title = p.title + ' — The XL Academy Blog';
      document.getElementById('crumb').textContent = p.title;
      var img = p.image ? '<img class="post-hero-img" src="'+esc(p.image)+'" alt="'+esc(p.title)+'" onerror="this.remove()">' : '';
      wrap.innerHTML =
        (p.category?'<span class="blog-cat">'+esc(p.category)+'</span>':'') +
        '<h1 class="post-title">'+esc(p.title)+'</h1>' +
        '<div class="post-meta">'+esc(p.author||'The XL Academy')+' · '+fmtDate(p.date)+'</div>' +
        img +
        '<div class="post-content">'+ (p.content||'') +'</div>';
    })
    .catch(function(){ state.textContent = 'Could not load this post.'; });
}
</script>
</body>
</html>
